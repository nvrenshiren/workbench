name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # provenance 签名需要 OIDC token

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: 校验 tag 与 package.json 版本一致
        if: github.event_name == 'release'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::package.json 版本 ($PKG) 与 release tag ($TAG) 不一致,先 bump 版本再发 Release"
            exit 1
          fi
          echo "版本一致: $PKG"

      - name: 隔离检查
        run: pnpm run check:isolation

      - name: 类型检查
        run: pnpm run typecheck

      - name: 测试
        run: pnpm test

      # 构建由 package.json 的 prepublishOnly(pnpm run build)在 publish 时触发
      - name: 发布到 npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
