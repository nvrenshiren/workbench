name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # 建 release / 打 tag / 推 version+changelog 回 main
  issues: write # semantic-release 在相关 issue/PR 评论
  pull-requests: write
  id-token: write # provenance 签名

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release 需要完整 history + tags

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: 隔离检查
        run: pnpm run check:isolation

      - name: 类型检查
        run: pnpm run typecheck

      - name: 测试
        run: pnpm test

      # 分析 Conventional Commits → 决定版本 → 改版本号 + CHANGELOG → 打 tag → npm publish(provenance)→ 建 GitHub Release
      # 构建由 package.json 的 prepublishOnly 在 npm publish 时触发
      - name: 语义化发布
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
